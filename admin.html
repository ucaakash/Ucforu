<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UCforU - Ultimate Boss Mode 👑</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { --primary: #ff4757; --secondary: #3742fa; --success: #2ed573; --warning: #ffa502; --bg: #f4f7f6; --surface: #ffffff; --text: #2f3542; --text-muted: #747d8c; --border: #e1e5ee; --shadow: rgba(0,0,0,0.05); }
        body.dark-mode { --bg: #0f172a; --surface: #1e293b; --text: #f8fafc; --text-muted: #94a3b8; --border: #334155; --shadow: rgba(0,0,0,0.5); }
        * { box-sizing: border-box; transition: background-color 0.3s, color 0.3s; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 1000; padding: 20px; }
        .login-box { background: var(--surface); padding: 40px; border-radius: 16px; text-align: center; width: 100%; max-width: 400px; box-shadow: 0 10px 30px var(--shadow); border: 1px solid var(--border); }
        .login-box input { width: 100%; padding: 14px; margin: 10px 0; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 10px; font-size: 16px; outline: none; }
        .login-box button { width: 100%; padding: 14px; margin-top: 15px; background: linear-gradient(135deg, var(--primary), #ff6b81); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; }
        
        #dashboard { display: none; width: 100%; height: 100%; flex-direction: row; }
        .sidebar { width: 260px; background: var(--surface); border-right: 1px solid var(--border); padding: 20px 0; display: flex; flex-direction: column; overflow-y: auto; }
        .logo { text-align: center; font-size: 26px; font-weight: 800; color: var(--primary); margin-bottom: 30px; letter-spacing: 1px; }
        .nav-btn { padding: 16px 25px; border: none; background: none; width: 100%; text-align: left; font-size: 16px; font-weight: 500; color: var(--text-muted); cursor: pointer; }
        .nav-btn.active { background: var(--bg); color: var(--primary); font-weight: 700; border-left: 4px solid var(--primary); }
        .nav-btn i { width: 25px; }

        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .tab-content { display: none; animation: fadeIn 0.4s ease-in-out; } .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--surface); padding: 25px; border-radius: 16px; box-shadow: 0 4px 15px var(--shadow); border: 1px solid var(--border); position: relative; overflow: hidden; }
        .stat-card::before { content: ''; position: absolute; top: 0; left: 0; width: 5px; height: 100%; background: var(--primary); }
        .stat-card h3 { margin: 0; font-size: 32px; font-weight: 800; }
        .stat-card p { margin: 5px 0 0; color: var(--text-muted); font-size: 13px; font-weight: 600; text-transform: uppercase; }

        .top-addicts { display: flex; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; }
        .addict-card { flex: 1; min-width: 150px; background: linear-gradient(135deg, var(--surface), var(--bg)); border: 1px solid var(--warning); padding: 15px; border-radius: 12px; text-align: center; }
        .addict-card i { color: var(--warning); font-size: 24px; margin-bottom: 10px; }
        .addict-card h4 { margin: 0; font-size: 16px; color: var(--text); }
        .addict-card p { margin: 5px 0 0; font-weight: bold; color: var(--primary); font-size: 14px;}

        .chart-container { background: var(--surface); padding: 20px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 30px; height: 300px; width: 100%; }
        .table-container { background: var(--surface); border-radius: 16px; border: 1px solid var(--border); overflow-x: auto; box-shadow: 0 4px 15px var(--shadow); width: 100%; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
        th { background-color: var(--bg); font-weight: 600; text-transform: uppercase; font-size: 13px; color: var(--text-muted); }
        tr:hover { background-color: var(--bg); }
        
        .delete-btn { background: rgba(255, 71, 87, 0.1); color: var(--primary); border: 1px solid var(--primary); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .nuke-btn { background: #e74c3c; color: white; border: none; padding: 12px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(231, 76, 60, 0.4); animation: pulseRed 2s infinite; }
        @keyframes pulseRed { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* CMS STYLING */
        .cms-panel { background: var(--surface); padding: 30px; border-radius: 16px; border: 1px solid var(--border); max-width: 800px; box-shadow: 0 4px 15px var(--shadow); width: 100%; }
        .form-group { margin-bottom: 25px; padding: 15px; border-radius: 10px; background: rgba(0,0,0,0.02); border: 1px dashed var(--border); }
        .form-group label { display: block; font-weight: 600; margin-bottom: 8px; color: var(--text); font-size: 15px; }
        .form-group select, .form-group input, .form-group textarea { width: 100%; padding: 14px; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 10px; font-size: 15px; outline: none; font-family: 'Inter', sans-serif; resize: vertical; }
        .save-cms-btn { width: 100%; background: linear-gradient(135deg, var(--success), #26ae60); color: white; padding: 15px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(46, 213, 115, 0.3); transition: 0.3s; }

        @media (max-width: 768px) {
            body { height: auto; overflow-y: auto; } #dashboard { flex-direction: column; }
            .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border); padding: 10px; flex-direction: row; flex-wrap: wrap; justify-content: space-between; align-items: center; }
            .logo { width: 100%; margin-bottom: 10px; font-size: 22px; text-align: left; padding-left: 10px; }
            hr { display: none; }
            .nav-btn { width: auto; padding: 10px 12px; font-size: 14px; text-align: center; border-left: none; border-bottom: 3px solid transparent; flex: 1; min-width: 30%; }
            .nav-btn.active { border-left: none; border-bottom-color: var(--primary); background: transparent; }
            .nav-btn i { display: block; margin: 0 auto 5px auto; font-size: 18px; }
            .main-content { padding: 15px; } .stats-grid { grid-template-columns: 1fr 1fr; } .cms-panel { padding: 20px; }
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2><i class="fa-solid fa-bolt"></i> God Mode Access</h2>
            <input type="text" id="adminUser" placeholder="Username (Rashi)" onkeypress="if(event.key === 'Enter') checkLogin()">
            <input type="password" id="adminPass" placeholder="Password (Rashi9012)" onkeypress="if(event.key === 'Enter') checkLogin()">
            <button onclick="checkLogin()">Enter Command Center</button>
            <p id="login-error" style="color: var(--primary); display: none; margin-top: 15px; font-size: 14px; font-weight:bold;">❌ Invalid Credentials!</p>
        </div>
    </div>

    <div id="dashboard">
        <div class="sidebar">
            <div class="logo">UCforU 👑</div>
            <button class="nav-btn active" onclick="switchTab('analytics', this)"><i class="fa-solid fa-chart-line"></i> <br>Analytics</button>
            <button class="nav-btn" onclick="switchTab('cms', this)"><i class="fa-solid fa-sliders"></i> <br>God Controls</button>
            <hr style="border:0; border-top:1px solid var(--border); margin: 20px 0; width: 100%;">
            <button class="nav-btn" onclick="toggleTheme()"><i class="fa-solid fa-moon" id="theme-icon"></i> <br><span id="theme-text">Dark</span></button>
            <button class="nav-btn" onclick="logoutAdmin()" style="color: var(--primary);"><i class="fa-solid fa-power-off"></i> <br>Logout</button>
        </div>

        <div class="main-content">
            <div id="tab-analytics" class="tab-content active">
                <div class="header">
                    <h1>Command Center</h1>
                    <button class="nuke-btn" onclick="nukeDatabase()"><i class="fa-solid fa-bomb"></i> SUNDAY NUKE (Clear All)</button>
                </div>

                <div class="stats-grid">
                    <div class="stat-card"><h3 id="total-users">0</h3><p>Total Cards</p></div>
                    <div class="stat-card blue"><h3 id="today-users">0</h3><p>Today's Hit</p></div>
                    <div class="stat-card orange"><h3 id="avg-time">0h 0m</h3><p>Global Avg</p></div>
                    <div class="stat-card green"><h3 id="total-challenges">0</h3><p>Active Battles</p></div>
                </div>

                <h3 style="margin-top: 0; color: var(--text-muted); text-transform: uppercase; font-size: 14px;">🏆 Hall of Shame (Top 3 Addicts)</h3>
                <div class="top-addicts" id="top-addicts-container"></div>

                <div class="chart-container"><canvas id="trafficChart"></canvas></div>

                <div class="table-container">
                    <table id="adminTable">
                        <thead><tr><th>Date</th><th>Nickname</th><th>Time (Min)</th><th>Formatted Time</th><th>Action</th></tr></thead>
                        <tbody id="adminBody"><tr><td colspan="5" style="text-align: center; padding: 40px;">Decrypting database...</td></tr></tbody>
                    </table>
                </div>
            </div>

            <div id="tab-cms" class="tab-content">
                <div class="header"><h1>🎛️ God Controls</h1></div>

                <div class="cms-panel">
                    
                    <div class="form-group" style="border-color: var(--primary); background: rgba(255, 71, 87, 0.05);">
                        <label><i class="fa-solid fa-power-off"></i> 1. Server Kill Switch (Maintenance Mode)</label>
                        <select id="cms-kill" style="font-weight: bold;">
                            <option value="false">🟢 ONLINE (Normal)</option>
                            <option value="true">🔴 OFFLINE (Maintenance Mode)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label><i class="fa-solid fa-bullhorn"></i> 2. Live Breaking News (Red Ticker)</label>
                        <input type="text" id="cms-marquee" placeholder="E.g., 🔥 Akash just broke the record with 15 hours! (Leave blank to hide)">
                    </div>

                    <div class="form-group">
                        <label><i class="fa-solid fa-robot"></i> 3. AI Personality (Roast Level)</label>
                        <select id="cms-roast" onchange="toggleCustomPrompt()">
                            <option value="poetic">Soft & Poetic (Normal Shayari)</option>
                            <option value="meme">GenZ Meme Style (Sarcastic & Funny)</option>
                            <option value="brutal">Brutal Savage (Heavy Roast)</option>
                            <option value="custom">🔥 CUSTOM (God Mode Prompt)</option>
                        </select>
                        <textarea id="cms-custom-prompt" rows="3" style="display:none; margin-top: 10px; border-color: var(--secondary);" placeholder="Type exactly how AI should act... E.g., 'Write a 1-line sarcastic comment like a strict Indian father.'"></textarea>
                    </div>

                    <div class="form-group">
                        <label><i class="fa-solid fa-palette"></i> 4. Instagram Card Theme</label>
                        <select id="cms-theme">
                            <option value="theme-floral">Light Aesthetic (Floral)</option>
                            <option value="theme-dark">Dark Mode (Black/Neon Red)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label><i class="fa-solid fa-heading"></i> 5. Guide Popup Title</label>
                        <input type="text" id="cms-popup" placeholder="E.g., How to Check ⏳ Dear">
                    </div>

                    <button class="save-cms-btn" onclick="saveCMS()"><i class="fa-solid fa-bolt"></i> EXECUTE GOD COMMANDS</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.onload = () => { if (localStorage.getItem('isRashiLoggedIn') === 'true') showDashboard(); };
        function checkLogin() {
            if (document.getElementById('adminUser').value === "Rashi" && document.getElementById('adminPass').value === "Rashi9012") {
                localStorage.setItem('isRashiLoggedIn', 'true'); showDashboard();
            } else { document.getElementById('login-error').style.display = 'block'; }
        }
        function showDashboard() { document.getElementById('login-screen').style.display = 'none'; document.getElementById('dashboard').style.display = 'flex'; initFirebase(); }
        function logoutAdmin() { localStorage.removeItem('isRashiLoggedIn'); location.reload(); }

        function switchTab(tabId, btnElement) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active'); btnElement.classList.add('active');
        }

        let isDark = false;
        function toggleTheme() {
            isDark = !isDark; document.body.classList.toggle('dark-mode', isDark);
            document.getElementById('theme-text').innerText = isDark ? "Light" : "Dark";
            document.getElementById('theme-icon').className = isDark ? "fa-solid fa-sun" : "fa-solid fa-moon";
            if(trafficChartInstance) updateChart(lastChartData);
        }

        function toggleCustomPrompt() {
            const select = document.getElementById('cms-roast').value;
            document.getElementById('cms-custom-prompt').style.display = select === 'custom' ? 'block' : 'none';
        }

        let database, trafficChartInstance = null, lastChartData = {};

        function initFirebase() {
            const firebaseConfig = { apiKey: "AIzaSyCeJWTbIF3mD43ihcoCZJ8LO-b896-FWa4", authDomain: "ucforu-730a7.firebaseapp.com", projectId: "ucforu-730a7", storageBucket: "ucforu-730a7.firebasestorage.app", messagingSenderId: "315045659904", appId: "1:315045659904:web:2e1700a51aae71a8a29fe5", databaseURL: "https://ucforu-730a7-default-rtdb.firebaseio.com" };
            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            database = firebase.database(); loadAnalytics(); loadCMS();
        }

        function loadAnalytics() {
            database.ref('challenges').on('value', snap => { document.getElementById('total-challenges').innerText = snap.exists() ? Object.keys(snap.val()).length : 0; });
            database.ref('leaderboard').on('value', snap => {
                const tbody = document.getElementById('adminBody'); tbody.innerHTML = "";
                let totalCount = 0, todayCount = 0, totalMins = 0; let flatUsers = []; const datesCount = {};
                const d = new Date(); const today = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
                if (snap.exists()) {
                    const data = snap.val();
                    Object.keys(data).reverse().forEach(date => {
                        datesCount[date] = Object.keys(data[date]).length;
                        Object.keys(data[date]).forEach(user => {
                            const u = data[date][user]; totalCount++; totalMins += parseInt(u.totalMinutes||0);
                            if(date === today) todayCount++; flatUsers.push({...u, date, userKey: user});
                            tbody.innerHTML += `<tr class="user-row"><td>${date}</td><td class="user-name"><strong>${u.nickname}</strong></td><td>${u.totalMinutes}</td><td><span style="background:var(--bg); padding:4px 8px; border-radius:4px;">${u.formattedTime}</span></td><td><button class="delete-btn" onclick="deleteUser('${date}','${user}')"><i class="fa-solid fa-trash"></i></button></td></tr>`;
                        });
                    });
                    flatUsers.sort((a,b) => b.totalMinutes - a.totalMinutes);
                    document.getElementById('top-addicts-container').innerHTML = flatUsers.slice(0,3).map((u,i) => `<div class="addict-card"><i class="fa-solid fa-trophy" style="color:${i===0?'#f1c40f':i===1?'#bdc3c7':'#cd7f32'}"></i><h4>${u.nickname}</h4><p>${u.formattedTime}</p></div>`).join('');
                    if(totalCount > 0) { const avg = Math.floor(totalMins/totalCount); document.getElementById('avg-time').innerText = `${Math.floor(avg/60)}h ${avg%60}m`; }
                    document.getElementById('total-users').innerText = totalCount; document.getElementById('today-users').innerText = todayCount;
                    lastChartData = datesCount; updateChart(datesCount);
                } else { tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">No data found.</td></tr>'; }
            });
        }

        function updateChart(dataObj) {
            const ctx = document.getElementById('trafficChart').getContext('2d'); const labels = Object.keys(dataObj).sort().slice(-7); const vals = labels.map(d => dataObj[d]);
            if(trafficChartInstance) trafficChartInstance.destroy();
            trafficChartInstance = new Chart(ctx, { type: 'bar', data: { labels: labels, datasets: [{ label: 'Cards', data: vals, backgroundColor: '#ff4757', borderRadius: 6 }] }, options: { responsive: true, maintainAspectRatio: false, plugins:{legend:{display:false}}, scales:{x:{grid:{display:false}}} } });
        }
        function deleteUser(d, u) { if(confirm("Delete this user?")) database.ref(`leaderboard/${d}/${u}`).remove(); }
        
        // 🔥 4. THE NUKE BUTTON
        function nukeDatabase() {
            if(confirm("🚨 WARNING! You are about to DELETE ALL Leaderboard Data! Proceed?")) {
                if(confirm("💣 100% SURE? This CANNOT BE UNDONE!")) {
                    database.ref('leaderboard').remove().then(() => {
                        alert("💥 NUKE SUCCESSFUL! Database is clean.");
                        location.reload();
                    });
                }
            }
        }

        // --- CMS SYSTEM ---
        function loadCMS() {
            database.ref('app_settings').on('value', snap => {
                if(snap.exists()) {
                    const s = snap.val();
                    document.getElementById('cms-kill').value = s.isMaintenance ? "true" : "false";
                    document.getElementById('cms-marquee').value = s.announcementText || "";
                    document.getElementById('cms-roast').value = s.aiRoast || 'poetic';
                    document.getElementById('cms-custom-prompt').value = s.customPrompt || "";
                    document.getElementById('cms-theme').value = s.cardTheme || 'theme-floral';
                    document.getElementById('cms-popup').value = s.popupTitle || 'How to Check ⏳';
                    toggleCustomPrompt();
                }
            });
        }

        function saveCMS() {
            const btn = document.querySelector('.save-cms-btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i> EXECUTING...";

            const data = {
                isMaintenance: document.getElementById('cms-kill').value === "true",
                announcementText: document.getElementById('cms-marquee').value,
                aiRoast: document.getElementById('cms-roast').value,
                customPrompt: document.getElementById('cms-custom-prompt').value,
                cardTheme: document.getElementById('cms-theme').value,
                popupTitle: document.getElementById('cms-popup').value
            };
            
            // Note: Preserving Android/iPhone guides if they exist
            database.ref('app_settings').once('value').then(snap => {
                if(snap.exists()) {
                    const old = snap.val();
                    if(old.androidGuide) data.androidGuide = old.androidGuide;
                    if(old.iphoneGuide) data.iphoneGuide = old.iphoneGuide;
                }
                return database.ref('app_settings').set(data);
            }).then(() => {
                btn.innerHTML = "<i class='fa-solid fa-check'></i> GOD COMMANDS SAVED!";
                btn.style.background = "#2ed573";
                alert("✅ Global Settings Updated Instantly!");
                setTimeout(() => { btn.innerHTML = originalText; btn.style.background = "linear-gradient(135deg, var(--success), #26ae60)"; }, 3000);
            }).catch((err) => { alert("❌ Error: " + err.message); btn.innerHTML = "Error! Try Again"; });
        }
    </script>
</body>
</html>
