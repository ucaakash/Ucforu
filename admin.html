<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCforU - Pro Admin Room 👑</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: #ff4757; margin-bottom: 5px; }
        
        .stats-container { display: flex; justify-content: center; flex-wrap: wrap; gap: 15px; margin-bottom: 25px; }
        .stat-box { background: white; padding: 15px 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; min-width: 140px; border-bottom: 4px solid #ff4757; }
        .stat-box h3 { margin: 0; font-size: 26px; color: #2f3542; }
        .stat-box p { margin: 5px 0 0 0; color: #747d8c; font-size: 13px; font-weight: 600; }
        
        .controls { max-width: 1000px; margin: 0 auto 15px auto; display: flex; justify-content: space-between; gap: 10px; }
        .search-box { padding: 10px 15px; width: 100%; max-width: 300px; border: 1px solid #ccc; border-radius: 8px; font-size: 15px; outline: none; }
        .export-btn { background: #2ed573; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .export-btn:hover { background: #26b360; }
        
        table { width: 100%; max-width: 1000px; margin: 0 auto; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #f1f2f6; }
        th { background-color: #2f3542; color: white; font-weight: 500; }
        tr:hover { background-color: #f8f9fa; }
        
        .delete-btn { background: #ff4757; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 13px; }
        .delete-btn:hover { background: #ff6b81; }
        
        #access-denied { display: none; text-align: center; margin-top: 100px; color: #ff4757; }
        #admin-panel { display: none; }
    </style>
</head>
<body>

    <div id="access-denied">
        <h1>❌ Access Denied</h1>
        <p>Bhai, galat password! Tum admin nahi lagte.</p>
    </div>

    <div id="admin-panel">
        <div class="header">
            <h1>👑 UCforU Pro Admin</h1>
            <p>Master Control Room - Handle your traffic like a boss!</p>
        </div>

        <div class="stats-container">
            <div class="stat-box">
                <h3 id="total-users">0</h3>
                <p>Total Cards</p>
            </div>
            <div class="stat-box">
                <h3 id="today-users">0</h3>
                <p>Today's Cards</p>
            </div>
            <div class="stat-box" style="border-bottom-color: #3742fa;">
                <h3 id="total-challenges">0</h3>
                <p>Total Challenges</p>
            </div>
        </div>

        <div class="controls">
            <input type="text" id="searchInput" class="search-box" placeholder="🔍 Search User by Name..." onkeyup="searchTable()">
            <button class="export-btn" onclick="exportToCSV()">📥 Download Data (CSV)</button>
        </div>

        <table id="adminTable">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Name</th>
                    <th>Screen Time (Min)</th>
                    <th>Formatted Time</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="adminBody">
                <tr><td colspan="5" style="text-align: center;">Loading data...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        // 🔐 SECURITY CHECK 
        const password = prompt("Admin Password batao bhai:");
        if (password !== "Akash@2026") {
            document.getElementById("access-denied").style.display = "block";
            throw new Error("Wrong Password");
        } else {
            document.getElementById("admin-panel").style.display = "block";
        }

        // --- Firebase Configuration ---
        const firebaseConfig = {
            apiKey: "AIzaSyCeJWTbIF3mD43ihcoCZJ8LO-b896-FWa4",
            authDomain: "ucforu-730a7.firebaseapp.com",
            projectId: "ucforu-730a7",
            storageBucket: "ucforu-730a7.firebasestorage.app",
            messagingSenderId: "315045659904",
            appId: "1:315045659904:web:2e1700a51aae71a8a29fe5",
            measurementId: "G-899BZCPKR2",
            databaseURL: "https://ucforu-730a7-default-rtdb.firebaseio.com"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 📊 Fetch and Display Data
        function loadAdminData() {
            const tbody = document.getElementById('adminBody');
            const todayDate = new Date().getFullYear() + '-' + String(new Date().getMonth() + 1).padStart(2, '0') + '-' + String(new Date().getDate()).padStart(2, '0');
            
            // Load Challenges Count
            database.ref('challenges').on('value', (snap) => {
                document.getElementById('total-challenges').innerText = snap.exists() ? Object.keys(snap.val()).length : 0;
            });

            // Load Leaderboard Data
            database.ref('leaderboard').on('value', (snapshot) => {
                tbody.innerHTML = "";
                let totalCount = 0;
                let todayCount = 0;

                if (snapshot.exists()) {
                    const allData = snapshot.val();
                    
                    Object.keys(allData).reverse().forEach(dateKey => {
                        const usersInDate = allData[dateKey];
                        
                        Object.keys(usersInDate).forEach(userKey => {
                            const userData = usersInDate[userKey];
                            totalCount++;
                            if(dateKey === todayDate) todayCount++;

                            tbody.innerHTML += `
                                <tr class="user-row">
                                    <td>${dateKey}</td>
                                    <td class="user-name"><strong>${userData.nickname}</strong></td>
                                    <td>${userData.totalMinutes}</td>
                                    <td>${userData.formattedTime}</td>
                                    <td>
                                        <button class="delete-btn" onclick="deleteEntry('${dateKey}', '${userKey}')">🗑️ Delete</button>
                                    </td>
                                </tr>
                            `;
                        });
                    });
                } else {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">Abhi tak koi data nahi aaya bhai.</td></tr>';
                }

                document.getElementById('total-users').innerText = totalCount;
                document.getElementById('today-users').innerText = todayCount;
            });
        }

        // 🗑️ Delete Function
        function deleteEntry(dateKey, userKey) {
            if (confirm("Sach me delete karna hai? Ye wapas nahi aayega!")) {
                database.ref(`leaderboard/${dateKey}/${userKey}`).remove()
                    .then(() => alert("Entry successfully deleted! 💥"))
                    .catch((error) => alert("Error: " + error.message));
            }
        }

        // 🔍 Search Function
        function searchTable() {
            const input = document.getElementById("searchInput").value.toLowerCase();
            const rows = document.getElementsByClassName("user-row");
            
            for (let i = 0; i < rows.length; i++) {
                const nameCol = rows[i].getElementsByClassName("user-name")[0];
                if (nameCol) {
                    const nameValue = nameCol.textContent || nameCol.innerText;
                    if (nameValue.toLowerCase().indexOf(input) > -1) {
                        rows[i].style.display = "";
                    } else {
                        rows[i].style.display = "none";
                    }
                }
            }
        }

        // 📥 Export to CSV Function
        function exportToCSV() {
            let csvContent = "data:text/csv;charset=utf-8,Date,Name,Total Minutes,Formatted Time\n";
            const rows = document.querySelectorAll("#adminTable tr.user-row");
            
            rows.forEach(row => {
                const cols = row.querySelectorAll("td");
                const date = cols[0].innerText;
                const name = cols[1].innerText;
                const mins = cols[2].innerText;
                const formatted = cols[3].innerText;
                csvContent += `${date},${name},${mins},${formatted}\n`;
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "UCforU_UserData.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // Script Load hote hi Data bula lo
        loadAdminData();
    </script>
</body>
</html>
