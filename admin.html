<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCforU - Admin Control Room 👑</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            color: #ff4757;
            margin-bottom: 5px;
        }
        .stats-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: center;
            min-width: 150px;
        }
        .stat-box h3 { margin: 0; font-size: 24px; color: #2f3542; }
        .stat-box p { margin: 5px 0 0 0; color: #747d8c; font-size: 14px; }
        
        table {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #f1f2f6;
        }
        th {
            background-color: #2f3542;
            color: white;
            font-weight: 500;
        }
        tr:hover { background-color: #f8f9fa; }
        
        .delete-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }
        .delete-btn:hover { background: #ff6b81; }
        
        #access-denied {
            display: none;
            text-align: center;
            margin-top: 100px;
            color: #ff4757;
        }
        #admin-panel { display: none; }
    </style>
</head>
<body>

    <div id="access-denied">
        <h1>❌ Access Denied</h1>
        <p>Bhai, galat password! Tum admin nahi lagte.</p>
    </div>

    <div id="admin-panel">
        <div class="header">
            <h1>👑 UCforU Admin Room</h1>
            <p>Welcome Boss! Yahan se sab control karo.</p>
        </div>

        <div class="stats-container">
            <div class="stat-box">
                <h3 id="total-users">0</h3>
                <p>Total Cards Generated</p>
            </div>
            <div class="stat-box">
                <h3 id="today-users">0</h3>
                <p>Today's Entries</p>
            </div>
        </div>

        <table id="adminTable">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Name</th>
                    <th>Screen Time</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="adminBody">
                <tr><td colspan="4" style="text-align: center;">Loading data...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        // 🔐 SECURITY CHECK (Simple Password)
        const password = prompt("Admin Password batao bhai:");
        if (password !== "Akash@2026") {
            document.getElementById("access-denied").style.display = "block";
            throw new Error("Wrong Password"); // Aage ka code nahi chalega
        } else {
            document.getElementById("admin-panel").style.display = "block";
        }

        // --- Firebase Configuration ---
        const firebaseConfig = {
            apiKey: "AIzaSyCeJWTbIF3mD43ihcoCZJ8LO-b896-FWa4",
            authDomain: "ucforu-730a7.firebaseapp.com",
            projectId: "ucforu-730a7",
            storageBucket: "ucforu-730a7.firebasestorage.app",
            messagingSenderId: "315045659904",
            appId: "1:315045659904:web:2e1700a51aae71a8a29fe5",
            measurementId: "G-899BZCPKR2",
            databaseURL: "https://ucforu-730a7-default-rtdb.firebaseio.com"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 📊 Fetch and Display Data
        function loadAdminData() {
            const tbody = document.getElementById('adminBody');
            const todayDate = new Date().getFullYear() + '-' + String(new Date().getMonth() + 1).padStart(2, '0') + '-' + String(new Date().getDate()).padStart(2, '0');
            
            database.ref('leaderboard').on('value', (snapshot) => {
                tbody.innerHTML = "";
                let totalCount = 0;
                let todayCount = 0;

                if (snapshot.exists()) {
                    const allData = snapshot.val();
                    
                    // Har Date ke folder me jayenge
                    Object.keys(allData).reverse().forEach(dateKey => {
                        const usersInDate = allData[dateKey];
                        
                        // Har User ka data nikalenge
                        Object.keys(usersInDate).forEach(userKey => {
                            const userData = usersInDate[userKey];
                            totalCount++;
                            if(dateKey === todayDate) todayCount++;

                            // Table mein Row banana
                            tbody.innerHTML += `
                                <tr>
                                    <td>${dateKey}</td>
                                    <td><strong>${userData.nickname}</strong></td>
                                    <td>${userData.formattedTime}</td>
                                    <td>
                                        <button class="delete-btn" onclick="deleteEntry('${dateKey}', '${userKey}')">🗑️ Delete</button>
                                    </td>
                                </tr>
                            `;
                        });
                    });
                } else {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">Abhi tak koi data nahi aaya bhai.</td></tr>';
                }

                // Stats Update
                document.getElementById('total-users').innerText = totalCount;
                document.getElementById('today-users').innerText = todayCount;
            });
        }

        // 🗑️ Delete Function
        function deleteEntry(dateKey, userKey) {
            const confirmDelete = confirm("Sach me delete karna hai? Ye wapas nahi aayega!");
            if (confirmDelete) {
                database.ref(`leaderboard/${dateKey}/${userKey}`).remove()
                    .then(() => alert("Entry successfully deleted! 💥"))
                    .catch((error) => alert("Error: " + error.message));
            }
        }

        // Script Load hote hi Data bula lo
        loadAdminData();
    </script>
</body>
</html>
