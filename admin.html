<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCforU - God Mode Admin 👑</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #ff4757; --secondary: #3742fa; --bg: #f4f7f6; --surface: #ffffff; --text: #2f3542; --border: #ccc; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; }
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-box { background: var(--surface); padding: 40px; border-radius: 12px; text-align: center; width: 90%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .login-box input, .control-group input, .control-group select, .control-group textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid var(--border); border-radius: 8px; font-size: 15px; outline: none; }
        .login-box button, .save-btn { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        #dashboard { display: none; width: 100%; }
        .sidebar { width: 250px; background: var(--surface); padding: 20px 0; border-right: 1px solid var(--border); }
        .nav-btn { padding: 15px 20px; border: none; background: none; width: 100%; text-align: left; font-size: 16px; cursor: pointer; color: #555; }
        .nav-btn.active { background: #f1f2f6; color: var(--primary); font-weight: bold; border-left: 4px solid var(--primary); }
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        
        /* Layouts */
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
        th, td { padding: 15px; border-bottom: 1px solid #eee; text-align: left; }
        
        .control-panel { background: white; padding: 25px; border-radius: 12px; max-width: 600px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .control-group { margin-bottom: 20px; }
        .control-group label { font-weight: 600; display: block; margin-bottom: 5px; color: var(--secondary); }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="color: #ff4757;">God Mode Admin</h2>
            <input type="password" id="adminPass" placeholder="Enter Password (Akash@2026)">
            <button onclick="checkLogin()">Login</button>
        </div>
    </div>

    <div id="dashboard">
        <div class="sidebar">
            <h2 style="text-align: center; color:#ff4757;">UCforU 👑</h2>
            <button class="nav-btn active" onclick="switchTab('analytics')">📊 Leaderboard Data</button>
            <button class="nav-btn" onclick="switchTab('controls')">🎛️ Live App Controls</button>
        </div>

        <div class="main-content">
            <div id="tab-analytics" class="tab-content active">
                <h2>Live Leaderboard Data</h2>
                <table>
                    <thead><tr><th>Date</th><th>Name</th><th>Time</th><th>Action</th></tr></thead>
                    <tbody id="adminBody"><tr><td colspan="4">Loading...</td></tr></tbody>
                </table>
            </div>

            <div id="tab-controls" class="tab-content">
                <h2>🎛️ Control Your Live Website</h2>
                <p style="color: #666;">Yahan se jo change karoge, website par turant update ho jayega!</p>
                
                <div class="control-panel">
                    <div class="control-group">
                        <label>1. Gemini Roast Level (AI Personality)</label>
                        <select id="set-roast">
                            <option value="poetic">Soft & Poetic Shayari (Normal)</option>
                            <option value="meme">Funny Meme Style (GenZ/Sarcastic)</option>
                            <option value="brutal">Brutal Roast (Khatarnak insult)</option>
                        </select>
                    </div>

                    <div class="control-group">
                        <label>2. Card Theme / Color</label>
                        <select id="set-theme">
                            <option value="theme-floral">Default Floral (Light)</option>
                            <option value="theme-dark">Dark Mode (Black/Neon)</option>
                        </select>
                    </div>

                    <div class="control-group">
                        <label>3. Popup / Guide Title</label>
                        <input type="text" id="set-popup-title" placeholder="E.g., Accept Challenge! ⚔️">
                    </div>

                    <button class="save-btn" onclick="saveSettings()">🚀 Update Website Live</button>
                    <p id="save-msg" style="color: #2ed573; display: none; font-weight: bold; text-align: center; margin-top: 10px;">Settings Live on Website! ✅</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCeJWTbIF3mD43ihcoCZJ8LO-b896-FWa4",
            authDomain: "ucforu-730a7.firebaseapp.com",
            projectId: "ucforu-730a7",
            storageBucket: "ucforu-730a7.firebasestorage.app",
            messagingSenderId: "315045659904",
            appId: "1:315045659904:web:2e1700a51aae71a8a29fe5",
            databaseURL: "https://ucforu-730a7-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function checkLogin() {
            if (document.getElementById('adminPass').value === "Akash@2026") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'flex';
                loadAdminData();
                loadCurrentSettings();
            } else alert("Wrong Password!");
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            event.target.classList.add('active');
        }

        // Load Leaderboard
        function loadAdminData() {
            database.ref('leaderboard').on('value', (snap) => {
                const tbody = document.getElementById('adminBody');
                tbody.innerHTML = "";
                if (snap.exists()) {
                    const data = snap.val();
                    Object.keys(data).reverse().forEach(date => {
                        Object.keys(data[date]).forEach(user => {
                            tbody.innerHTML += `<tr><td>${date}</td><td>${data[date][user].nickname}</td><td>${data[date][user].formattedTime}</td><td><button onclick="database.ref('leaderboard/${date}/${user}').remove()">Delete</button></td></tr>`;
                        });
                    });
                }
            });
        }

        // Live Controls Logic
        function loadCurrentSettings() {
            database.ref('app_settings').on('value', (snap) => {
                if(snap.exists()) {
                    const settings = snap.val();
                    document.getElementById('set-roast').value = settings.aiRoast || "poetic";
                    document.getElementById('set-theme').value = settings.cardTheme || "theme-floral";
                    document.getElementById('set-popup-title').value = settings.popupTitle || "How to Check ⏳";
                }
            });
        }

        function saveSettings() {
            const settings = {
                aiRoast: document.getElementById('set-roast').value,
                cardTheme: document.getElementById('set-theme').value,
                popupTitle: document.getElementById('set-popup-title').value
            };
            database.ref('app_settings').set(settings).then(() => {
                document.getElementById('save-msg').style.display = 'block';
                setTimeout(() => document.getElementById('save-msg').style.display = 'none', 3000);
            });
        }
    </script>
</body>
</html>
