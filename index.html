<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UCforU - Viral Screen Time Card</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>UCforu</h1>
<p>Create & Share Your Digital</p>
</header>

<div id="toast-container"></div>

<main style="width:100%;display:flex;flex-direction:column;align-items:center;">

<!-- INPUT -->
<div id="inputForm" class="glass-card">
<label>Your Name</label>
<input type="text" id="nickname" placeholder="Ex..Akash">

<label>Upload Screenshot</label>
<input type="file" id="screenshot">

<button id="analyzeBtn" class="primary">Reveal My Digital Self ✨</button>
</div>

<!-- LOADING -->
<div id="processing" class="glass-card" style="display:none;">
<div class="spinner"></div>
<h2>Analyzing...</h2>
</div>

<!-- RESULT -->
<div id="result" class="glass-card" style="display:none;">
<h2>Your Card</h2>

<img id="generated-image-preview">

<button id="downloadBtn" class="primary">Download ⬇️</button>
<button id="shareBtn" class="secondary">Share Card 📤</button>
<button id="challengeBtn" class="secondary">Challenge ⚔️</button>

<button onclick="location.reload()">Reset</button>
</div>

<!-- LEADERBOARD -->
<div class="glass-card">
<h2>🏆 Leaderboard</h2>
<table class="leaderboard-table">
<tbody id="leaderboardBody">
<tr><td>Loading...</td></tr>
</tbody>
</table>
</div>

</main>

<!-- HIDDEN CARD -->
<div id="card-render-container" style="position:absolute;left:-9999px;">
<div id="instagram-card">

<div id="render-name">Name</div>
<div id="render-time">0h</div>
<div id="render-shayari">...</div>

<div id="qrcode-container"></div>

</div>
</div>

<script src="script.js" defer></script>

</body>
</html>
