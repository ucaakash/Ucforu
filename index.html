<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCforU - Viral Screen Time Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<p id="guideBtn">How to take a screenshot?(Guide) ❤️❤️</p>

<div id="guideModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 10000; justify-content: center; align-items: center; padding: 20px;">
    <div class="glass-card">
        <span id="closeGuide" style="position: absolute; top: 10px; right: 20px; font-size: 30px; cursor: pointer;">&times;</span>
        <h2 style="text-align: center; margin-bottom: 20px;">How to Check ⏳</h2>
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <button id="tabAndroid" class="primary" style="padding: 10px;">Android</button>
            <button id="tabIphone" class="secondary" style="padding: 10px;">iPhone</button>
        </div>
        <div id="contentAndroid"><ol style="padding-left:20px;"><li>Settings jao</li><li>Digital Wellbeing search karo</li><li>Today's Time ka screenshot lo</li></ol></div>
        <div id="contentIphone" style="display:none;"><ol style="padding-left:20px;"><li>Settings > Screen Time</li><li>See All Activity</li><li>Screenshot lo</li></ol></div>
        <button onclick="document.getElementById('guideModal').style.display='none'" class="primary" style="margin-top:20px;">Got it!</button>
    </div>
</div>

<header>
    <h1>UCforu</h1>
    <p>Create & Share Your Digital</p>
</header>

<main>
    <div id="inputForm" class="glass-card">
        <label>Your Name</label>
        <input type="text" id="nickname" placeholder="Ex..Akash" style="margin-bottom:20px;">
        <label>Upload Screen Time Image</label>
        <input type="file" id="screenshot" accept="image/*">
        <button id="analyzeBtn" class="primary" style="margin-top:20px;">Reveal My Digital Self ✨</button>
    </div>

    <div id="result" class="glass-card" style="display:none; text-align:center;">
        <img id="generated-image-preview" src="" alt="Card">
        <button id="downloadBtn" class="primary">Download Card ⬇️</button>
        <button id="shareBtn" class="secondary">Share Link 🔗</button>
        <button id="challengeBtn" class="secondary">Challenge Friends ⚔️</button>
    </div>

    <div id="leaderboard" class="glass-card">
        <h2 style="text-align: center;">🏆 Leaderbord (Today)</h2>
        <table class="leaderboard-table">
            <tbody id="leaderboardBody"></tbody>
        </table>
    </div>
</main>

<div id="card-render-container">
    <div id="instagram-card" class="instagram-card">
        <div class="card-title">SCREEN TIME</div>
        <div class="card-name" id="render-name">Name</div>
        <div class="card-time" id="render-time">0h 0m</div>
        <div class="card-shayari" id="render-shayari"></div>
        <div id="qrcode-container"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
